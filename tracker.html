<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Document Tracker — Maharashtra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --border: #e8e5de;
  --border-strong: #ccc9c0;
  --text: #1a1917;
  --muted: #6b6860;
  --hint: #a09d96;
  --accent: #2d5a3d;
  --accent-light: #e8f2eb;
  --accent-mid: #4a8c61;
  --amber: #92570a;
  --amber-light: #fdf3e3;
  --red: #8b2020;
  --red-light: #fdf0f0;
  --radius: 8px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 14px; font-weight: 500; color: var(--accent); letter-spacing: 0.02em; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
.top-actions { display: flex; align-items: center; gap: 10px; }
.lang-pill { display: flex; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
.lang-pill button { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 4px 12px; border: none; background: transparent; cursor: pointer; color: var(--muted); transition: all .15s; }
.lang-pill button.active { background: var(--text); color: white; }
.client-badge { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); background: var(--bg); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

.hero {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 2rem 1.5rem 1.5rem;
}
.hero-inner { max-width: 860px; margin: 0 auto; }
.client-name { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.client-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem; }
.stat-label { font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 500; }
.stat-value.green { color: var(--accent); }
.stat-value.amber { color: var(--amber); }

.progress-wrap { }
.progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s ease; }

.main { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

.cat-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.cat-btn {
  font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 14px;
  border: 1px solid var(--border); border-radius: 20px; cursor: pointer;
  background: var(--surface); color: var(--muted); transition: all .15s;
  white-space: nowrap;
}
.cat-btn:hover { border-color: var(--border-strong); color: var(--text); }
.cat-btn.active { background: var(--text); color: white; border-color: var(--text); }
.cat-btn .count { font-family: 'DM Mono', monospace; font-size: 10px; opacity: .7; margin-left: 4px; }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.section-head {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.section-title { font-size: 15px; font-weight: 500; }
.section-prog { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.section-bar { height: 3px; background: var(--border); }
.section-bar-fill { height: 100%; background: var(--accent-mid); transition: width .4s; }

.doc-item {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.doc-item:last-child { border-bottom: none; }
.doc-item:hover { background: #faf9f7; }

.doc-check-col {
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 14px;
}
.doc-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.doc-body { padding: 12px 0 12px 0; }
.doc-name { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 2px; transition: all .15s; }
.doc-name.done { text-decoration: line-through; color: var(--hint); }
.doc-sub { font-size: 12px; color: var(--muted); line-height: 1.4; }
.doc-note-wrap { margin-top: 6px; }
.doc-note {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); resize: none; line-height: 1.4;
}
.doc-note:focus { outline: none; border-color: var(--accent-mid); background: white; }
.doc-note::placeholder { color: var(--hint); }

.doc-right { padding: 12px 14px 12px 10px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.status-sel {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  padding: 3px 7px; border: 1px solid var(--border); border-radius: 6px;
  background: white; color: var(--muted); cursor: pointer;
  max-width: 110px;
}
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; letter-spacing: 0.02em; white-space: nowrap; }
.badge-must { background: var(--red-light); color: var(--red); }
.badge-cond { background: var(--amber-light); color: var(--amber); }

.save-toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--text); color: white;
  font-size: 13px; padding: 8px 16px;
  border-radius: 20px; opacity: 0;
  transition: opacity .3s;
  pointer-events: none; z-index: 200;
}
.save-toast.show { opacity: 1; }

.setup-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
.setup-card {
  background: white; border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 2.5rem; max-width: 420px; width: 100%;
}
.setup-logo { font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 2rem; display: flex; align-items: center; gap: 8px; }
.setup-title { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
.setup-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
.setup-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.setup-input {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--text); margin-bottom: 1rem;
}
.setup-input:focus { outline: none; border-color: var(--accent-mid); background: white; }
.setup-select {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); color: var(--text); margin-bottom: 1.5rem; cursor: pointer;
}
.setup-btn {
  width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  padding: 11px; border: none; border-radius: var(--radius);
  background: var(--accent); color: white; cursor: pointer; transition: opacity .15s;
}
.setup-btn:hover { opacity: .88; }
.setup-btn:disabled { opacity: .5; cursor: not-allowed; }

.error-msg { font-size: 13px; color: var(--red); margin-top: .5rem; }

@media (max-width: 600px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .doc-item { grid-template-columns: 36px 1fr; }
  .doc-right { display: none; }
}
</style>
</head>

      <option value="sell">Sell property / संपत्ति बेचें</option>
      <option value="rental">Rental agreement / किराया अनुबंध</option>
      <option value="gift">Gift deed / उपहार पत्र</option>
      <option value="inheritance">Inheritance / विरासत</option>
    </select>
    <button class="setup-btn" id="setup-btn" onclick="createTracker()">Create my tracker →</button>
    <div class="error-msg" id="setup-error"></div>
  </div>
</div>

<!-- Main tracker (shown when client ID exists) -->
<div id="main-app" style="display:none">

    <div class="logo"><span class="logo-dot"></span> MH Property Tracker</div>

  </div>

  <div class="hero">

      <div class="client-name" id="hero-name">Loading...</div>
      <div class="client-sub" id="hero-sub"></div>
      <div class="stats-row">

        <div class="stat"><div class="stat-label" id="lbl-obtained">Obtained</div><div class="stat-value green" id="val-obtained">—</div></div>
        <div class="stat"><div class="stat-label" id="lbl-pending">Pending</div><div class="stat-value amber" id="val-pending">—</div></div>
        <div class="stat"><div class="stat-label" id="lbl-pct">Complete</div><div class="stat-value" id="val-pct">—</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="lbl-progress">Overall progress</span>
          <span id="val-progress-pct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="master-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="cat-nav" id="cat-nav"></div>
    <div class="section-card">
      <div class="section-head">
        <span class="section-title" id="cat-title"></span>
        <span class="section-prog" id="cat-prog"></span>
      </div>
      <div class="section-bar"><div class="section-bar-fill" id="cat-bar-fill" style="width:0%"></div></div>
      <div id="doc-list"></div>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">Saved ✓</div>

// ── STATE ──
let lang = 'en';
let clientId = null;
let clientData = null;
let activeCat = 'builder';
let docState = {};
let saveTimer = null;

// ── INIT ──
async function init() {
  const params = new URLSearchParams(window.location.search);
  clientId = params.get('id');

  if (!clientId) {
    document.getElementById('setup-screen').style.display = 'flex';
    return;
  }

  document.getElementById('main-app').style.display = 'block';

  // Load from Supabase
  const { data, error } = await sb
    .from('trackers')
    .select('*')
    .eq('client_id', clientId)
    .single();

  if (error || !data) {
    // Fallback to localStorage
    const local = localStorage.getItem('tracker_' + clientId);
    if (local) {
      const parsed = JSON.parse(local);
      clientData = parsed;
      docState = parsed.doc_state || {};
      activeCat = parsed.cat || 'builder';
    } else {
      document.getElementById('setup-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
      return;
    }
  } else {
    clientData = data;
    docState = data.doc_state || {};
    activeCat = data.cat || 'builder';
  }

  document.getElementById('client-id-badge').textContent = clientId;
  document.getElementById('hero-name').textContent = clientData.name;
  renderAll();
}

// ── CREATE TRACKER ──
async function createTracker() {
  const name = document.getElementById('setup-name').value.trim();
  const cat = document.getElementById('setup-cat').value;
  if (!name) { document.getElementById('setup-error').textContent = 'Please enter your name.'; return; }

  const btn = document.getElementById('setup-btn');
  btn.disabled = true; btn.textContent = 'Creating...';

  const id = Math.random().toString(36).substr(2,8).toUpperCase();
  const payload = { client_id: id, name, cat, doc_state: {}, created_at: new Date().toISOString() };

  // Try Supabase, fallback to localStorage
  const { error } = await sb.from('trackers').insert(payload);
  localStorage.setItem('tracker_' + id, JSON.stringify(payload));

  window.location.href = `?id=${id}`;
}

// ── RENDER ──
function t(k) { return L[lang][k]; }

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-hi').classList.toggle('active', l === 'hi');
  renderAll();
}

function renderAll() {
  const docs = L[lang].docs;
  const catNames = t('catNames');
  document.getElementById('lbl-total').textContent = t('total');
  document.getElementById('lbl-obtained').textContent = t('obtained');
  document.getElementById('lbl-pending').textContent = t('pending');
  document.getElementById('lbl-pct').textContent = t('pct');
  document.getElementById('lbl-progress').textContent = t('progress');

  // Category sub for hero
  const catIdx = CATS.indexOf(activeCat);
  document.getElementById('hero-sub').textContent = catNames[catIdx];

  // Stats
  let total = 0, obtained = 0;
  CATS.forEach(cat => {
    L.en.docs[cat].forEach((_, i) => {
      const s = getState(cat, i);
      if (s.status !== 2) { total++; if (s.status === 1) obtained++; }
    });
  });
  const pending = total - obtained;
  const pct = total ? Math.round(obtained / total * 100) : 0;
  document.getElementById('val-total').textContent = total;
  document.getElementById('val-obtained').textContent = obtained;
  document.getElementById('val-pending').textContent = pending;
  document.getElementById('val-pct').textContent = pct + '%';
  document.getElementById('val-progress-pct').textContent = pct + '%';
  document.getElementById('master-fill').style.width = pct + '%';

  // Cat nav
  document.getElementById('cat-nav').innerHTML = CATS.map((k, i) => {
    const catDocs = L.en.docs[k];
    let done = 0, tot = 0;
    catDocs.forEach((_, j) => { const s = getState(k, j); if (s.status !== 2) { tot++; if (s.status === 1) done++; } });
    return `<button class="cat-btn ${k === activeCat ? 'active' : ''}" onclick="switchCat('${k}')">${catNames[i]}<span class="count">${done}/${tot}</span></button>`;
  }).join('');

  renderDocList();
}

function renderDocList() {
  const docs = L[lang].docs[activeCat];
  const catIdx = CATS.indexOf(activeCat);
  document.getElementById('cat-title').textContent = L[lang].catNames[catIdx];

  let shown = 0, done = 0;
  docs.forEach((_, i) => {
    const s = getState(activeCat, i);
    if (s.status !== 2) { shown++; if (s.status === 1) done++; }
  });
  const pct = shown ? Math.round(done / shown * 100) : 0;
  document.getElementById('cat-prog').textContent = `${done} / ${shown}  •  ${pct}%`;
  document.getElementById('cat-bar-fill').style.width = pct + '%';

  const statuses = t('status');
  document.getElementById('doc-list').innerHTML = docs.map((d, i) => {
    const s = getState(activeCat, i);
    const dim = s.status === 2;
    return `<div class="doc-item" style="${dim ? 'opacity:.35' : ''}">
      <div class="doc-check-col">
        <input type="checkbox" class="doc-check" ${s.status === 1 ? 'checked' : ''} onchange="toggleCheck(${i}, this.checked)">
      </div>
      <div class="doc-body">
        <div class="doc-name ${s.status === 1 ? 'done' : ''}">${d.n}</div>
        <div class="doc-sub">${d.s}</div>
        <div class="doc-note-wrap">
          <textarea class="doc-note" rows="1" placeholder="${t('notes')}" onchange="saveNote(${i}, this.value)">${s.note || ''}</textarea>
        </div>
      </div>
      <div class="doc-right">
        <select class="status-sel" onchange="changeStatus(${i}, parseInt(this.value))">
          ${statuses.map((st, si) => `<option value="${si}" ${s.status === si ? 'selected' : ''}>${st}</option>`).join('')}
        </select>
        <span class="badge ${d.m ? 'badge-must' : 'badge-cond'}">${d.m ? t('mandatory') : t('conditional')}</span>
      </div>
    </div>`;
  }).join('');
}

function getState(cat, idx) {
  if (!docState[cat]) docState[cat] = {};
  if (!docState[cat][idx]) docState[cat][idx] = { status: 0, note: '' };
  return docState[cat][idx];
}

function switchCat(cat) { activeCat = cat; renderAll(); }

function toggleCheck(idx, checked) {
  getState(activeCat, idx).status = checked ? 1 : 0;
  renderAll();
  schedSave();
}

function changeStatus(idx, val) {
  getState(activeCat, idx).status = val;
  renderAll();
  schedSave();
}

function saveNote(idx, val) {
  getState(activeCat, idx).note = val;
  schedSave();
}

function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persist, 800);
}

async function persist() {
  if (!clientId) return;
  const payload = { doc_state: docState, updated_at: new Date().toISOString() };
  localStorage.setItem('tracker_' + clientId, JSON.stringify({ ...clientData, doc_state: docState }));
  await sb.from('trackers').update(payload).eq('client_id', clientId);
  const toast = document.getElementById('save-toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

init();
</script>
